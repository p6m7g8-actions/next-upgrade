name: "P6 GHA: Upgrade Dependencies for NextJS Static Site"
description: "P6 GHA: Upgrade Dependencies for NextJS Static Site"
author: "Philip M. Gollucci"
inputs:
  gh_token:
    description: "Fallback GitHub token (e.g., P6_A_GH_TOKEN)"
    required: false
    default: ""
  git_token:
    description: "Secondary fallback token for branch operations"
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Checkout code
      uses: p6m7g8-actions/checkout@main
      with:
        fetch-depth: 0
    - name: Force main branch
      shell: bash
      run: |
        git fetch origin main
        git checkout -B main origin/main
    - name: Node
      uses: p6m7g8-actions/node-setup@main
    - name: Update Dependencies
      shell: bash
      run: |
        pnpm up --latest --prod
    - name: Generate Delta
      shell: bash
      run: |
        git diff
    - name: Normalize GitHub token
      id: token
      uses: p6m7g8-actions/gh-token-normalize@main
      with:
        preferred-token: ${{ github.token }}
        fallback-token: ${{ inputs.gh_token }}
        default-token: ${{ github.token }}
    - name: Configure authenticated git remote
      shell: bash
      run: |
        git remote set-url origin "https://x-access-token:${{ steps.token.outputs.value }}@github.com/${{ github.repository }}.git"
    - name: Create Pull Request
      id: create_pr
      uses: peter-evans/create-pull-request@v8.1.0
      with:
        token: ${{ steps.token.outputs.value }}
        branch-token: ${{ steps.token.outputs.value }}
        commit-message: |
          chore(deps): upgrade dependencies
        base: main
        branch: github-actions/upgrade-main
        title: "chore(deps): upgrade dependencies"
        labels: |
          auto-approve
          auto-merge
        reviewers: |
          p6m7g8-automation
        body: |
          Upgrades project dependencies.
        author: github-actions <github-actions@github.com>
        committer: github-actions <github-actions@github.com>
        signoff: true
